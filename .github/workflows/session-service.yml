name: Session service CI/CD

on:
  push:
    paths: "session-service/**"
    branches: ["main"]

  pull_request:
    paths: "session-service/**"
    branches: ["main"]

  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Copying codebase
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24.3"

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  build-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build and Push
        run: |
          docker build -f ./session-service/Dockerfile -t ${{ secrets.DOCKERHUB_USER }}/mercypher-session:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USER }}/mercypher-session:${{ github.sha }}

  deploy:
    env:
      TF_VAR_image_tag: ${{github.sha}}
      TF_VAR_subscription_id: ${{secrets.SUBSCRIPTION_ID}}
      TF_VAR_session_service_port: ${{secrets.SESSION_PORT}}
      TF_VAR_dockerhub_user: ${{secrets.DOCKERHUB_USER}}

      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init & Apply
        run: |
          cd infrastructure/services/session
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE }}" \
            -backend-config="container_name=services" \
            -backend-config="key=session/terraform.tfstate"
          terraform apply -auto-approve
